<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elliot Z Muehlhausen — Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream:       #F5F0E8;
      --navy:        #1A2744;
      --steel-blue:  #3D6B9A;
      --light-rule:  #DDD8CE;
      --warm-mid:    #7A8A9A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      background-color: var(--cream);
      color: var(--navy);
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 3.5rem 2rem 2rem;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    .name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--navy);
      line-height: 1.0;
      margin-bottom: 0.4rem;
    }

    .title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--steel-blue);
      margin-bottom: 2rem;
    }

    .header-rule { width: 100%; height: 1px; background: var(--light-rule); }

    .action-bar {
      border-bottom: 1px solid var(--light-rule);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      flex-wrap: wrap;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: var(--navy);
      color: var(--cream);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.6rem 1.4rem;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .btn-download:hover { background: var(--steel-blue); transform: translateY(-1px); }

    .action-note {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--warm-mid);
    }

    main {
      flex: 1;
      padding: 2rem 2rem 3rem;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .pdf-container { flex: 1; min-height: 78vh; }

    .pdf-container iframe {
      width: 100%;
      min-height: 78vh;
      border: none;
      box-shadow: 0 2px 4px rgba(26,39,68,0.06), 0 8px 32px rgba(26,39,68,0.10);
      background: white;
      display: block;
    }

    .mobile-fallback { display: none; text-align: center; padding: 3rem 1rem; }
    .mobile-fallback p { font-size: 1rem; font-style: italic; color: var(--warm-mid); margin-bottom: 1.5rem; line-height: 1.7; }

    footer {
      border-top: 1px solid var(--light-rule);
      padding: 1.25rem 2rem;
      text-align: center;
    }

    .footer-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--warm-mid);
    }

    @media (max-width: 600px) {
      header { padding: 2.5rem 1.5rem 1.5rem; text-align: center; }
      .action-bar { padding: 1rem 1.5rem; justify-content: center; }
      .pdf-container iframe { display: none; }
      .mobile-fallback { display: block; }
      main { padding: 1.5rem 1.5rem 2.5rem; }
    }

    header      { animation: fadeIn 0.4s ease both; }
    .action-bar { animation: fadeIn 0.4s ease 0.08s both; }
    main        { animation: fadeIn 0.4s ease 0.16s both; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <h1 class="name">Elliot Z Muehlhausen</h1>
    <p class="title">Student Journalist</p>
    <div class="header-rule"></div>
  </header>

  <div class="action-bar">
    <a class="btn-download" href="elliot-resume.pdf" download="Elliot-Muehlhausen-Resume.pdf">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download PDF
    </a>
    <span class="action-note">View below or save a copy</span>
  </div>

  <main>
    <div class="pdf-container">
      <iframe src="elliot-resume.pdf" title="Elliot Muehlhausen Resume" aria-label="Resume PDF viewer"></iframe>
      <div class="mobile-fallback">
        <p>Tap below to open the resume in your browser,<br>where you can read and save a copy.</p>
        <a class="btn-download" href="elliot-resume.pdf" target="_blank">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          Open Resume
        </a>
      </div>
    </div>
  </main>

  <footer>
    <p class="footer-text">Elliot Z Muehlhausen &nbsp;·&nbsp; Butler University</p>
  </footer>

</body>
</html>
