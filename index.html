<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elliot Z Muehlhausen — Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --cream:      #F5F0E8;
      --navy:       #1A2744;
      --steel-blue: #3D6B9A;
      --light-rule: #DDD8CE;
      --warm-mid:   #7A8A9A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background-color: var(--cream);
      color: var(--navy);
      font-family: 'EB Garamond', Georgia, serif;
    }

    /* ── CENTER WRAPPER ── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3.5rem 2.5rem 0;
    }

    /* Name and title left-aligned within the centered block */
    .header-block {
      width: 100%;
      max-width: 900px;
    }

    .name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--navy);
      line-height: 1.0;
      margin-bottom: 0.35rem;
      display: inline-block;
    }

    .title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--steel-blue);
    }

    /* ── DOUBLE RULE — width matched to name via JS ── */
    #double-rule {
      /* width set by JS */
      border: none;
      background: transparent;
    }

    #double-rule::before,
    #double-rule::after {
      content: '';
      display: block;
      width: 100%;
      height: 1px;
      background-color: var(--navy);
      opacity: 0.2;
    }

    #double-rule::before {
      margin-bottom: 5px;
    }

    /* ── ACTION BAR ── */
    .action-bar {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding-bottom: 1rem;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: var(--navy);
      color: var(--cream);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.6rem 1.4rem;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .btn-download:hover { background: var(--steel-blue); transform: translateY(-1px); }

    .action-note {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--warm-mid);
    }

    /* ── PDF CANVAS ── */
    .pdf-area {
      padding-bottom: 3rem;
    }

    #pdf-canvas {
      display: block;
      height: auto;
      box-shadow: 0 2px 4px rgba(26,39,68,0.06), 0 8px 32px rgba(26,39,68,0.12);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--light-rule);
      padding: 1.1rem 2rem;
      text-align: center;
      width: 100%;
    }

    .footer-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--warm-mid);
    }

    @media (max-width: 600px) {
      .center { padding: 2rem 1.25rem 0; }
    }

    .center, .action-bar, .pdf-area { animation: fadeIn 0.4s ease both; }
    .action-bar { animation-delay: 0.08s; }
    .pdf-area   { animation-delay: 0.16s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="center">
    <div class="header-block">
      <h1 class="name" id="name-el">Elliot Z Muehlhausen</h1>
      <p class="title" id="title-el">Student Journalist</p>
    </div>

    <div id="double-rule"></div>

    <div class="action-bar" id="action-bar">
      <a class="btn-download" id="btn-dl" href="elliot-resume.pdf" download="Elliot-Muehlhausen-Resume.pdf">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download PDF
      </a>
      <span class="action-note">View below or save a copy</span>
    </div>

    <div class="pdf-area">
      <canvas id="pdf-canvas"></canvas>
    </div>
  </div>

  <footer>
    <p class="footer-text">Elliot Z Muehlhausen &nbsp;·&nbsp; Butler University</p>
  </footer>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    function alignElements() {
      const nameEl = document.getElementById('name-el');
      const rule   = document.getElementById('double-rule');
      const canvas = document.getElementById('pdf-canvas');
      const btn    = document.getElementById('btn-dl');

      const nameWidth = nameEl.getBoundingClientRect().width;

      rule.style.width  = nameWidth + 'px';
      canvas.style.width = nameWidth + 'px';

      const btnHeight = btn.getBoundingClientRect().height;
      const half = Math.round(btnHeight / 2);
      rule.style.paddingTop    = half + 'px';
      rule.style.paddingBottom = half + 'px';
    }

    async function renderPDF() {
      alignElements();

      const canvas = document.getElementById('pdf-canvas');
      const ctx    = canvas.getContext('2d');
      const targetWidth = canvas.getBoundingClientRect().width;

      try {
        const pdf  = await pdfjsLib.getDocument('elliot-resume.pdf').promise;
        const page = await pdf.getPage(1);

        const baseViewport = page.getViewport({ scale: 1 });
        const scale        = targetWidth / baseViewport.width;
        const viewport     = page.getViewport({ scale });

        const dpr = window.devicePixelRatio || 1;
        canvas.width        = viewport.width  * dpr;
        canvas.height       = viewport.height * dpr;
        canvas.style.width  = viewport.width  + 'px';
        canvas.style.height = viewport.height + 'px';
        ctx.scale(dpr, dpr);

        await page.render({ canvasContext: ctx, viewport }).promise;

      } catch (err) {
        console.error('PDF render error:', err);
      }
    }

    document.fonts.ready.then(renderPDF);

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        const canvas = document.getElementById('pdf-canvas');
        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        renderPDF();
      }, 100);
    });
  </script>

</body>
</html>
