<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elliot Z Muehlhausen — Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --cream:      #F5F0E8;
      --navy:       #1A2744;
      --steel-blue: #3D6B9A;
      --light-rule: #DDD8CE;
      --warm-mid:   #7A8A9A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background-color: var(--cream);
      color: var(--navy);
      font-family: 'EB Garamond', Georgia, serif;
    }

    /* ── HEADER ── */
    header {
      padding: 3.5rem 2.5rem 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    .name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--navy);
      line-height: 1.0;
      margin-bottom: 0.4rem;
    }

    .title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--steel-blue);
      margin-bottom: 1.5rem;
    }

    /* Double rule — height roughly matching download button text */
    .double-rule {
      width: 100%;
      height: 0.75rem; /* approximate height of button text line */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .double-rule::before,
    .double-rule::after {
      content: '';
      display: block;
      width: 100%;
      height: 1px;
      background: var(--navy);
      opacity: 0.25;
    }

    /* ── ACTION BAR ── */
    .action-bar {
      padding: 0.9rem 2.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: var(--navy);
      color: var(--cream);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.6rem 1.4rem;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .btn-download:hover { background: var(--steel-blue); transform: translateY(-1px); }

    .action-note {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--warm-mid);
    }

    /* ── PDF CANVAS ── */
    .pdf-area {
      padding: 0 2.5rem 3rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    #pdf-canvas {
      display: block;
      width: 100%;
      height: auto;
      box-shadow: 0 2px 4px rgba(26,39,68,0.06), 0 8px 32px rgba(26,39,68,0.12);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--light-rule);
      padding: 1.1rem 2rem;
      text-align: center;
    }

    .footer-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--warm-mid);
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header { padding: 2.5rem 1.5rem 1.25rem; text-align: center; }
      .action-bar { padding: 0.75rem 1.5rem; justify-content: center; }
      .pdf-area { padding: 0 1.5rem 2.5rem; }
    }

    /* Load animation */
    header, .action-bar, .pdf-area { animation: fadeIn 0.4s ease both; }
    .action-bar { animation-delay: 0.08s; }
    .pdf-area   { animation-delay: 0.16s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <h1 class="name">Elliot Z Muehlhausen</h1>
    <p class="title">Student Journalist</p>
    <div class="double-rule"></div>
  </header>

  <div class="action-bar">
    <a class="btn-download" href="elliot-resume.pdf" download="Elliot-Muehlhausen-Resume.pdf">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download PDF
    </a>
    <span class="action-note">View below or save a copy</span>
  </div>

  <div class="pdf-area">
    <canvas id="pdf-canvas"></canvas>
  </div>

  <footer>
    <p class="footer-text">Elliot Z Muehlhausen &nbsp;·&nbsp; Butler University</p>
  </footer>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    async function renderPDF() {
      const canvas = document.getElementById('pdf-canvas');
      const ctx = canvas.getContext('2d');

      try {
        const pdf = await pdfjsLib.getDocument('elliot-resume.pdf').promise;
        const page = await pdf.getPage(1);

        // Use the full available width of the pdf-area container
        const pdfArea = document.querySelector('.pdf-area');
        const availableWidth = pdfArea.clientWidth;

        const viewport = page.getViewport({ scale: 1 });
        const scale = availableWidth / viewport.width;
        const scaledViewport = page.getViewport({ scale });

        // HiDPI support
        const dpr = window.devicePixelRatio || 1;
        canvas.width = scaledViewport.width * dpr;
        canvas.height = scaledViewport.height * dpr;
        canvas.style.width = scaledViewport.width + 'px';
        canvas.style.height = scaledViewport.height + 'px';
        ctx.scale(dpr, dpr);

        await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;

      } catch (err) {
        console.error('PDF render error:', err);
      }
    }

    renderPDF();
    window.addEventListener('resize', () => {
      const canvas = document.getElementById('pdf-canvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      renderPDF();
    });
  </script>

</body>
</html>
